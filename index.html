<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aura | Experience Sound</title>
    
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-QJ3XKRFX98"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-QJ3XKRFX98');
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;700&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            background: radial-gradient(circle at 50% 50%, #1a1a2e, #050508);
            color: white; 
            font-family: 'Outfit', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
        }

        .container { max-width: 600px; width: 90%; text-align: center; }

        .card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 40px; 
            padding: 60px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }

        #product-img {
            width: 100%;
            max-width: 400px;
            display: none; 
            margin-bottom: 30px;
            filter: drop-shadow(0 0 30px rgba(0, 212, 255, 0.3));
            animation: popIn 0.8s ease-out;
        }

        @keyframes popIn {
            0% { opacity: 0; transform: scale(0.9); }
            100% { opacity: 1; transform: scale(1); }
        }

        .details-list { display: none; text-align: left; margin-top: 20px; }
        
        .list-item { 
            margin: 15px 0; 
            display: flex; 
            align-items: center; 
            font-size: 1.2rem;
            opacity: 0;
            animation: fadeIn 0.5s ease-out forwards;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .btn {
            padding: 18px 40px;
            background: linear-gradient(135deg, #00d4ff, #8a2be2);
            color: white; border-radius: 50px;
            cursor: pointer; border: none; font-weight: bold; font-size: 1rem;
            transition: 0.3s;
        }
        .btn:hover { transform: scale(1.05); box-shadow: 0 0 20px rgba(0, 212, 255, 0.4); }
    </style>
</head>
<body>

    <div class="container">
        <div class="card" id="main-card">
            <div id="intro-view">
                <h1>Aura.</h1>
                <p>Hör die Perfektion in jedem Detail.</p>
                <button class="btn" onclick="revealProduct()" style="margin-top: 30px;">Jetzt ansehen</button>
            </div>

            <img src="image_979802.jpg" alt="Aura Kopfhörer" id="product-img">
            
            <div id="details" class="details-list">
                <h2 style="margin-bottom: 15px;">Features</h2>
                <div class="list-item" style="animation-delay: 0.2s;">✓ Audiophiler Klangraum</div>
                <div class="list-item" style="animation-delay: 0.4s;">✓ Memory-Foam Komfort</div>
                <div class="list-item" style="animation-delay: 0.6s;">✓ Active Noise Cancelling</div>
                <button class="btn" onclick="location.reload()" style="background: #444; margin-top: 20px;">Zurück</button>
            </div>
        </div>
    </div>

    <script>
        function revealProduct() {
            // Intro ausblenden
            document.getElementById('intro-view').style.display = 'none';
            // Bild anzeigen
            document.getElementById('product-img').style.display = 'block';
            // Details anzeigen
            document.getElementById('details').style.display = 'block';
        }
    </script>
</body>
</html>
