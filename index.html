<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NextGen | Aura Concept</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;700&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: radial-gradient(circle at top right, #1a1a2e, #0f0f1a);
            color: white;
            font-family: 'Outfit', sans-serif;
            overflow-x: hidden;
            min-height: 100vh;
        }

        .container { max-width: 1200px; margin: 0 auto; padding: 50px; }

        /* Interaktives Card-Design */
        .hero-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 40px;
            padding: 80px;
            text-align: center;
            transition: transform 0.4s ease, border 0.4s ease;
            cursor: pointer;
        }

        .hero-card:hover {
            transform: translateY(-10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
        }

        h1 { font-size: 5rem; letter-spacing: -3px; margin-bottom: 20px; }
        .glow { color: #00d4ff; text-shadow: 0 0 20px rgba(0, 212, 255, 0.5); }

        .btn {
            display: inline-block;
            margin-top: 30px;
            padding: 20px 40px;
            background: linear-gradient(135deg, #00d4ff, #8a2be2);
            border-radius: 30px;
            color: white;
            text-decoration: none;
            font-weight: bold;
            transition: opacity 0.3s;
        }

        .btn:hover { opacity: 0.8; }

        /* Kleine schwebende Animation für das "Moderne" */
        .shape {
            position: absolute;
            width: 300px; height: 300px;
            background: radial-gradient(circle, #8a2be2, transparent);
            filter: blur(100px);
            z-index: -1;
            animation: float 10s infinite alternate;
        }

        @keyframes float {
            from { transform: translate(0, 0); }
            to { transform: translate(50px, 100px); }
        }
    </style>
</head>
<body>

    <div class="shape"></div>

    <div class="container">
        <div class="hero-card">
            <h1>Aura <span class="glow">Experience.</span></h1>
            <p>Die Zukunft des Designs. Interaktiv, fließend, kompromisslos.</p>
            <a href="#" class="btn">Produkt ansehen</a>
        </div>
    </div>

</body>
</html>
