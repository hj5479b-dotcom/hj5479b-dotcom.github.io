<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NextGen | Aura Concept</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;700&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            background: radial-gradient(circle at top right, #1a1a2e, #0f0f1a);
            color: white; 
            font-family: 'Outfit', sans-serif;
            overflow-x: hidden; 
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container { 
            max-width: 600px; 
            width: 90%;
            margin: 50px auto; 
            text-align: center; 
        }

        /* Karten Design */
        .card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 40px; 
            padding: 60px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        /* Detail-Sektion initial versteckt */
        #details { 
            display: none; 
            text-align: left; 
        }
        
        h1 { font-size: 3.5rem; letter-spacing: -2px; margin-bottom: 20px; }
        h2 { margin-bottom: 20px; font-size: 2rem; }
        
        .list-item { margin-bottom: 15px; display: flex; align-items: center; font-size: 1.1rem; }
        .list-item::before { content: "●"; color: #00d4ff; margin-right: 15px; }

        .btn {
            display: inline-block; 
            margin-top: 30px; 
            padding: 18px 35px;
            background: linear-gradient(135deg, #00d4ff, #8a2be2);
            border-radius: 30px; 
            color: white; 
            cursor: pointer;
            border: none; 
            font-size: 1rem; 
            font-weight: bold;
            transition: transform 0.2s, opacity 0.2s;
        }
        
        .btn:hover { transform: scale(1.05); opacity: 0.9; }
        
        .btn-back { background: #444; }
    </style>
</head>
<body>

    <div class="container">
        <div class="card" id="main-view">
            <h1>Aura <span style="color: #00d4ff;">Experience.</span></h1>
            <p>Die Zukunft des Sounds. Klicke unten, um mehr zu erfahren.</p>
            <button class="btn" onclick="showDetails()">Produkt ansehen</button>
        </div>

        <div class="card" id="details">
            <h2>Deine Aura Specs</h2>
            <p style="margin-bottom: 25px; opacity: 0.8;">Das High-End Erlebnis für audiophile Genießer.</p>
            
            <div class="list-item">Extremer Komfort durch Memory-Foam</div>
            <div class="list-item">40 Stunden Akkulaufzeit</div>
            <div class="list-item">Aktive Geräuschunterdrückung (ANC)</div>
            <div class="list-item">Hochauflösende Klangtreue</div>
            
            <button class="btn btn-back" onclick="location.reload()">Zurück</button>
        </div>
    </div>

    <script>
        function showDetails() {
            document.getElementById('main-view').style.display = 'none';
            document.getElementById('details').style.display = 'block';
        }
    </script>
</body>
</html>
